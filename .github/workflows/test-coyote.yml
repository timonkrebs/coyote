name: Coyote CI
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:
    branches: [ main ]
jobs:
  build-and-test:
    name: Build and test Coyote
    strategy:
      matrix:
        platform: [ windows-latest, ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.platform }}
    env:
      COYOTE_CLI_TELEMETRY_OPTOUT: 1
    steps:
      - uses: actions/checkout@v5
      - name: Setup NuGet.exe
        uses: NuGet/setup-nuget@v4
        with:
          nuget-version: '6.x'
      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            8.0.x
      - name: Setup debugging tools
        if: ${{ matrix.platform == 'windows-latest' }}
        run: |
          Invoke-WebRequest -Uri https://download.sysinternals.com/files/Procdump.zip -OutFile Procdump.zip
          7z x .\Procdump.zip -oexternal && rm Procdump.zip
          echo "PROCDUMP_PATH=$pwd\external" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh
      - name: Build Coyote projects
        run: ./Scripts/build.ps1 -ci -nuget
        shell: pwsh
      - name: Smoke test the packed Coyote CLI
        # Install the CLI from the just-packed nupkg (an exclusive local-feed config,
        # so the identically-versioned nuget.org release cannot shadow it) and rewrite
        # one real assembly. Guards the tool's packaged dependency closure: a package
        # missing e.g. Mono.Cecil installs fine and prints its banner, then dies on the
        # first rewrite -- a failure mode consumers otherwise hit before this repo does.
        # Windows only, like the pack itself: build.ps1 -nuget produces bin/nuget solely
        # on Windows, and the published artifact comes from that leg.
        if: ${{ matrix.platform == 'windows-latest' }}
        run: |
          $ErrorActionPreference = "Stop"
          $feed = (Resolve-Path ./bin/nuget).Path
          $nupkg = Get-ChildItem $feed -Filter 'Microsoft.Coyote.CLI.*.nupkg' | Select-Object -First 1
          $version = $nupkg.Name -replace '^Microsoft\.Coyote\.CLI\.', '' -replace '\.nupkg$', ''
          Write-Host "Packed CLI version: $version"
          $work = Join-Path $env:RUNNER_TEMP 'coyote-cli-smoke'
          New-Item -ItemType Directory -Force -Path $work | Out-Null
          "<?xml version=""1.0""?><configuration><packageSources><clear /><add key=""coyote-local"" value=""$feed"" /></packageSources></configuration>" | Set-Content (Join-Path $work 'nuget.config')
          dotnet tool install Microsoft.Coyote.CLI --tool-path $work --version $version --configfile (Join-Path $work 'nuget.config')
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Copy-Item ./bin/net10.0/System.CommandLine.dll $work
          $env:PATH = "$work$([IO.Path]::PathSeparator)$env:PATH"
          coyote rewrite (Join-Path $work 'System.CommandLine.dll')
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: pwsh
      - name: Validate Coyote rewriting
        if: ${{ matrix.platform == 'windows-latest' }}
        run: ./Tests/compare-rewriting-diff-logs.ps1
        shell: pwsh
      - name: Run Coyote tests
        run: ./Scripts/run-tests.ps1 -ci
        shell: pwsh
      - name: Archive Coyote binaries
        uses: actions/upload-artifact@v7
        with:
          name: coyote-binaries-${{ matrix.platform }}
          path: |
            ./bin
            !./bin/nuget/**
      - name: Archive Coyote NuGet packages
        if: ${{ matrix.platform == 'windows-latest' }}
        uses: actions/upload-artifact@v7
        with:
          name: coyote-packages
          path: ./bin/nuget
      - name: Archive test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: coyote-test-results-${{ matrix.platform }}
          path: ./Tests/**/TestResults
  build-and-test-samples:
    name: Build and test Coyote samples
    needs: build-and-test
    strategy:
      matrix:
        platform: [ windows-latest, ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.platform }}
    env:
      COYOTE_CLI_TELEMETRY_OPTOUT: 1
    steps:
      - uses: actions/checkout@v5
      - name: Setup .NET 10.0 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Download Coyote binaries
        uses: actions/download-artifact@v7
        with:
          name: coyote-binaries-${{ matrix.platform }}
          path: ./bin
      - name: Download Coyote NuGet packages
        uses: actions/download-artifact@v7
        with:
          name: coyote-packages
          path: ./bin/nuget
      - name: Build Coyote samples
        run: |
          ./Samples/Scripts/build.ps1 -local -nuget
          ./Samples/Scripts/build-tests.ps1 -local -nuget
        shell: pwsh
      - name: Test Coyote samples
        run: ./Samples/Scripts/run-tests.ps1
        shell: pwsh
